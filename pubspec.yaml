name: posts_app
description: "Posts app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  #di
  cherrypick: ^2.1.0

  #state management
  flutter_bloc: ^9.1.1

  #data classes helpers
  equatable: ^2.0.7
  freezed: ^2.5.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  #network
  dio: ^5.8.0
  retrofit: ^4.4.2

  #navigation
  auto_route: ^9.3.0

  #storages
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3

  #error handling
  dartz: ^0.10.1

  #utils
  internet_connection_checker: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  retrofit_generator: ^9.1.9
  json_serializable: ^6.9.0
  hive_generator: ^2.0.1
  auto_route_generator: ^9.0.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
